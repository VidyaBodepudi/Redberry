<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redberry Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        redberry: {
                            500: '#E11D48',
                            600: '#BE123C',
                            900: '#881337',
                        },
                        dark: {
                            800: '#1f2937',
                            900: '#111827',
                            950: '#030712'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone for JSX compilation in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #030712;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        const { Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip } = window.Recharts;

        function Dashboard() {
            const [stats, setStats] = useState(null);
            const [prompts, setPrompts] = useState([]);
            
            useEffect(() => {
                fetch('/api/stats')
                    .then(res => res.json())
                    .then(data => setStats(data));
                    
                fetch('/api/prompts')
                    .then(res => res.json())
                    .then(data => setPrompts(data.prompts.reverse())); // Newest first
            }, []);

            if (!stats) return <div className="p-8 text-center text-gray-400 font-medium">Loading Telemetry...</div>;

            const radarData = [
                { subject: 'Clarity (Inv. Vagueness)', A: Math.max(0, 100 - (stats.avg_vagueness * 100)), fullMark: 100 },
                { subject: 'Syntax Integrity', A: Math.max(0, 100 - (stats.avg_syntax * 100)), fullMark: 100 },
                { subject: 'Semantic Focus (Inv. Drift)', A: Math.max(0, 100 - (stats.avg_drift * 100)), fullMark: 100 },
            ];

            return (
                <div className="p-6 max-w-7xl mx-auto space-y-6">
                    {/* Header */}
                    <div className="flex items-center space-x-3 pb-4 border-b border-gray-800">
                        <div className="w-8 h-8 rounded-full bg-redberry-500/20 flex items-center justify-center">
                            <i data-lucide="activity" className="text-redberry-500 w-5 h-5"></i>
                        </div>
                        <h1 className="text-2xl font-bold tracking-tight text-white">REDBERRY 
                            <span className="text-gray-500 font-normal ml-2">Enterprise Telemetry</span>
                        </h1>
                    </div>

                    {/* Top Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="glass-panel p-6 rounded-2xl">
                            <h3 className="text-gray-400 text-sm font-medium mb-1">Total Intercepts</h3>
                            <div className="text-4xl font-bold text-white">{stats.total_prompts}</div>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl border-l-4 border-l-green-500">
                            <h3 className="text-gray-400 text-sm font-medium mb-1">Prompts Approved</h3>
                            <div className="text-4xl font-bold text-white">{stats.total_approved}</div>
                        </div>
                        <div className="glass-panel p-6 rounded-2xl border-l-4 border-l-redberry-500">
                            <h3 className="text-gray-400 text-sm font-medium mb-1">Prompts Rejected</h3>
                            <div className="text-4xl font-bold text-white">{stats.total_rejected}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Radar Chart Panel */}
                        <div className="glass-panel p-6 rounded-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-redberry-600 to-transparent"></div>
                            <h2 className="text-lg font-semibold text-white mb-2">Aggregate Prompt Strength</h2>
                            <p className="text-sm text-gray-400 mb-6">Analyzing the holistic syntactic baseline of your commands.</p>
                            
                            <div className="h-64 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <RadarChart cx="50%" cy="50%" outerRadius="80%" data={radarData}>
                                        <PolarGrid stroke="#374151" />
                                        <PolarAngleAxis dataKey="subject" tick={{ fill: '#9ca3af', fontSize: 12 }} />
                                        <PolarRadiusAxis angle={30} domain={[0, 100]} tick={false} axisLine={false} />
                                        <Radar name="User" dataKey="A" stroke="#E11D48" fill="#E11D48" fillOpacity={0.3} />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl relative overflow-hidden flex flex-col h-full border-l-4 border-l-purple-500">
                            <h2 className="text-lg font-semibold text-white mb-2">Prompt Activity Heatmap</h2>
                            <p className="text-sm text-gray-400 mb-6">Execution density across the last 30 days.</p>
                            
                            <div className="flex-1 flex items-end">
                                <div className="w-full">
                                    <div className="grid grid-cols-7 gap-1">
                                        {/* Activity Grid */}
                                        {Array.from({ length: 28 }).map((_, i) => {
                                            // Mock generic data mixed with real grouped data
                                            const today = new Date();
                                            today.setHours(0,0,0,0);
                                            const targetDate = new Date(today);
                                            targetDate.setDate(today.getDate() - (27 - i));
                                            
                                            // Count prompts matching this day
                                            const count = prompts.filter(p => {
                                                if (!p.created_at) return false;
                                                const d = new Date(p.created_at * 1000);
                                                d.setHours(0,0,0,0);
                                                return d.getTime() === targetDate.getTime();
                                            }).length;
                                            
                                            let bgClass = "bg-dark-800";
                                            if (count === 1) bgClass = "bg-redberry-900";
                                            if (count === 2) bgClass = "bg-redberry-600";
                                            if (count > 2) bgClass = "bg-redberry-500 shadow-[0_0_10px_rgba(225,29,72,0.6)]";
                                            
                                            return (
                                                <div 
                                                    key={i} 
                                                    className={`aspect-square rounded-sm ${bgClass} transition-colors border border-white/5`}
                                                    title={`${targetDate.toDateString()}: ${count} intercepts`}
                                                ></div>
                                            );
                                        })}
                                    </div>
                                    <div className="flex justify-between text-xs font-mono text-gray-500 mt-2">
                                        <span>30 Days Ago</span>
                                        <div className="flex items-center space-x-1">
                                            <span>Low</span>
                                            <div className="w-2 h-2 bg-dark-800 rounded-sm"></div>
                                            <div className="w-2 h-2 bg-redberry-900 rounded-sm"></div>
                                            <div className="w-2 h-2 bg-redberry-500 rounded-sm"></div>
                                            <span>High</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Recent Prompts List */}
                        <div className="glass-panel p-0 rounded-2xl overflow-hidden flex flex-col h-full relative lg:col-span-2">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-600 to-transparent"></div>
                            <div className="p-6 pb-2">
                                <h2 className="text-lg font-semibold text-white">Recent Violations</h2>
                                <p className="text-sm text-gray-400">Direct insights from the persona engine.</p>
                            </div>
                            
                            <div className="overflow-y-auto flex-1 p-6 pt-2 space-y-4 max-h-[320px]">
                                {prompts.length === 0 ? (
                                    <div className="text-gray-500 text-center py-8">No prompts intercepted yet.</div>
                                ) : prompts.map((p, i) => (
                                    <div key={i} className="bg-dark-800/50 rounded-lg p-4 border border-gray-800/50">
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-xs font-mono text-gray-400 bg-black/40 px-2 py-1 rounded">
                                                {p.session_id.substring(0, 16)}...
                                            </span>
                                            {p.snark_response ? (
                                                <span className="px-2 py-1 text-[10px] uppercase font-bold tracking-wider rounded bg-redberry-500/20 text-redberry-500 border border-redberry-500/30">Rejected</span>
                                            ) : (
                                                <span className="px-2 py-1 text-[10px] uppercase font-bold tracking-wider rounded bg-green-500/20 text-green-500 border border-green-500/30">Approved</span>
                                            )}
                                        </div>
                                        <p className="text-sm text-white mb-3 line-clamp-2">"{p.text}"</p>
                                        {p.snark_response && (
                                            <div className="mt-3 p-3 bg-redberry-900/20 border-l-2 border-redberry-500 rounded-r text-sm text-redberry-100">
                                                <span className="font-semibold text-redberry-400 block mb-1">Redberry:</span>
                                                {p.snark_response}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
        
        // Initialize lucide icons after render
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
