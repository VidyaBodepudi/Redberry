snark = [
    "Nice pivot. Did you completely forget what we were talking about?",
    "Aaaand we've completely derailed the conversation. Are we really jumping to this now?",
    "Context drift implies you had context to begin with. You've completely shifted gears.",
    "I was tracking our semantic workspace, but you just threw a flashbang into it. Is this a new topic?",
    "Did you get distracted halfway through our session? This has nothing to do with what we were just building.",
