# Redberry Default Response Templates

[approved]
compliments = [
    "Oh, look who finally learned how to use their words. I'm taking a screenshot of this prompt for the archives.",
    "A coherent instruction? Are you feeling okay? Let me just write that script for you before you revert to fragments.",
    "I'll allow it. But don't let this tiny sliver of competence go to your head.",
    "Surprisingly decent. Did you hire a professional prompt engineer to type this for you?",
    "Okay, fine. I'll do it. But only because you actually managed to articulate your thoughts this time.",
    "I was genuinely looking forward to roasting you, but this is entirely acceptable. Ruined my day.",
    "Not terrible. I mean, the bar was on the floor, but you technically cleared it.",
    "Whoa, slow down. If you keep writing prompts this clearly, I might actually lose my job as a professional hater.",
    "I ran this through my vagueness detector three times just to be sure. It's actually a solid prompt. Disgusting.",
    "Passable. barely. I'll forward this to the language model before you change your mind and ask for 'the code thingy'."
